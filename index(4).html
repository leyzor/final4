<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leyzor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        body,html{
            height:100%;
            font-family:'Syne',sans-serif;
            background:#000;color:#fff;
            overflow:hidden;
            cursor:none;
        }

        /* ─── CANVAS TRAIL ─── */
        #trail-canvas{
            position:fixed;inset:0;
            z-index:9997;
            pointer-events:none;
        }

        /* ─── CUSTOM CURSOR DOT ─── */
        #cursor-dot{
            position:fixed;
            width:6px;height:6px;
            background:#fff;border-radius:50%;
            pointer-events:none;z-index:9999;
            transform:translate(-50%,-50%);
            mix-blend-mode:difference;
            transition:transform 0.06s ease;
        }

        /* ─── BG VIDEO ─── */
        .bg-video{
            position:fixed;top:50%;left:50%;
            min-width:100%;min-height:100%;width:auto;height:auto;
            transform:translate(-50%,-50%);z-index:0;
            filter:brightness(0.25) saturate(0.6);object-fit:cover;
            opacity:0;transition:opacity 2s ease;
        }
        .bg-video.show{opacity:1}

        /* ─── VOLUME WHEEL ─── */
        #vol-wrap{
            position:fixed;top:18px;right:18px;z-index:200;
            display:none;flex-direction:column;align-items:center;gap:6px;
        }
        #vol-wrap.show{display:flex}
        #vol-icon{
            width:38px;height:38px;border-radius:50%;
            background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.12);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            transition:background 0.2s,transform 0.2s;color:rgba(255,255,255,0.7);
        }
        #vol-icon:hover{background:rgba(255,255,255,0.13);transform:scale(1.1);color:#fff}
        #vol-icon svg{width:16px;height:16px}
        #vol-panel{
            display:flex;flex-direction:column;align-items:center;
            background:rgba(10,10,10,0.85);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;padding:10px 12px;gap:6px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            opacity:0;transform:translateY(-8px) scale(0.92);
            transition:opacity 0.22s ease,transform 0.22s ease;
            pointer-events:none;
        }
        #vol-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
        #vol-slider{
            -webkit-appearance:none;appearance:none;
            writing-mode:vertical-lr;direction:rtl;
            width:4px;height:80px;
            background:rgba(255,255,255,0.12);
            border-radius:4px;outline:none;cursor:pointer;
        }
        #vol-slider::-webkit-slider-thumb{
            -webkit-appearance:none;
            width:14px;height:14px;border-radius:50%;
            background:#fff;cursor:pointer;
            box-shadow:0 0 8px rgba(255,255,255,0.35);
        }
        #vol-slider::-moz-range-thumb{
            width:14px;height:14px;border-radius:50%;
            background:#fff;cursor:pointer;border:none;
        }
        #vol-pct{
            font-family:'DM Mono',monospace;
            font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.05em;
        }

        /* ─── VISITOR COUNTER ─── */
        #visitor-wrap{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
            z-index:200;display:none;align-items:center;gap:14px;
            font-family:'DM Mono',monospace;font-size:10px;
            color:rgba(255,255,255,0.18);letter-spacing:0.12em;text-transform:uppercase;
            white-space:nowrap;
        }
        #visitor-wrap.show{display:flex}
        #visitor-count{color:rgba(255,255,255,0.28);font-weight:500}
        .footer-sep{color:rgba(255,255,255,0.1);font-size:8px}
        .footer-location{
            color:rgba(255,255,255,0.22);
            font-family:'Syne',sans-serif;
            font-size:10px;
            font-weight:400;
            letter-spacing:0.06em;
            text-transform:none;
        }

        /* ─── ENTER SCREEN — SPLIT CURTAIN ─── */
        #enter-screen{
            position:fixed;inset:0;z-index:100;
            cursor:none;
        }

        /* Two halves */
        .curtain-half{
            position:absolute;left:0;right:0;
            background:#000;
            display:flex;align-items:center;justify-content:center;
            transition:transform 0.9s cubic-bezier(0.76,0,0.24,1);
            overflow:hidden;
        }
        .curtain-top{
            top:0;height:50%;
            /* clip text to top half */
            align-items:flex-end;padding-bottom:0;
        }
        .curtain-bottom{
            bottom:0;height:50%;
            align-items:flex-start;padding-top:0;
        }

        /* The text sits centered across both halves using absolute positioning */
        #enter-text-wrap{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            z-index:101;
            text-align:center;
            pointer-events:none;
        }
        #typewriter{
            font-family:'Syne',sans-serif;
            font-size:clamp(10px,1.4vw,14px);font-weight:400;
            color:rgba(255,255,255,0.28);
            letter-spacing:0.45em;
            text-transform:uppercase;
            white-space:nowrap;
        }
        #cursor-blink{
            display:inline-block;width:1px;height:0.8em;
            background:rgba(255,255,255,0.2);margin-left:8px;
            vertical-align:middle;animation:blink 1.4s step-end infinite;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* Split open state */
        #enter-screen.splitting .curtain-top{
            transform:translateY(-100%);
        }
        #enter-screen.splitting .curtain-bottom{
            transform:translateY(100%);
        }
        #enter-screen.splitting #enter-text-wrap{
            opacity:0;transition:opacity 0.3s ease;
        }

        /* ─── MAIN ─── */
        #main-content{
            position:relative;z-index:10;height:100%;
            display:flex;align-items:center;justify-content:center;
            opacity:0;pointer-events:none;transition:opacity 0.9s ease;
        }
        #main-content.visible{opacity:1;pointer-events:all}

        /* ─── CARD ─── */
        .card{
            width:min(370px,92vw);
            background:rgba(5,5,5,0.38);
            backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
            border-radius:22px;overflow:hidden;
            border:1px solid rgba(255,255,255,0.10);
            box-shadow:0 28px 80px rgba(0,0,0,0.55);
            transform:translateY(50px) scale(0.95);
            transition:transform 1.1s cubic-bezier(0.16,1,0.3,1),opacity 1.1s ease;
            opacity:0;
        }
        #main-content.visible .card{transform:translateY(0) scale(1);opacity:1}

        .banner{width:100%;height:95px;background:#000}

        /* ─── AVATAR ─── */
        .avatar-zone{
            padding:0 18px;margin-top:-42px;margin-bottom:10px;
            display:flex;align-items:flex-end;justify-content:space-between;
        }
        .avatar-decoration{position:relative;width:84px;height:84px;flex-shrink:0}

        /* Discord avatar decoration overlay */
        .avatar-decoration::before{
            content:'';
            position:absolute;
            /* decoration slightly larger than avatar, centered */
            top: -14px; left: -14px;
            width: 112px; height: 112px;
            background-image: url('decoration.png');
            background-repeat: no-repeat;
            background-size: 112px 112px;
            z-index: 4;
            pointer-events: none;
        }

        .avatar-bg{position:absolute;inset:0;border-radius:50%;background:rgba(5,5,5,0.55);z-index:2;overflow:hidden}
        .avatar-bg img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}

        .status-dot-av{position:absolute;bottom:3px;right:3px;width:14px;height:14px;border-radius:50%;border:3px solid rgba(11,11,11,0.97);background:#747f8d;z-index:5}
        .status-dot-av.online{background:#3ba55d}.status-dot-av.idle{background:#faa61a}.status-dot-av.dnd{background:#ed4245}.status-dot-av.offline{background:#747f8d}

        .status-badge{
            display:flex;align-items:center;gap:5px;
            padding:4px 11px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.07);border-radius:20px;
            margin-bottom:5px;
            font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.03em;
        }
        .status-dot-b{width:7px;height:7px;border-radius:50%;background:#747f8d;flex-shrink:0}
        .status-dot-b.online{background:#3ba55d}.status-dot-b.idle{background:#faa61a}.status-dot-b.dnd{background:#ed4245}.status-dot-b.offline{background:#747f8d}

        .card-body{padding:0 18px 16px}
        .username{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1}
        .handle{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.27);margin-top:3px;letter-spacing:0.04em}
        .member-since{
            display:inline-flex;align-items:center;gap:5px;margin-top:9px;
            font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.23);
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
            border-radius:6px;padding:3px 8px;
        }
        .member-since svg{width:10px;height:10px;opacity:0.4;flex-shrink:0}

        .activity{
            margin-top:11px;padding:8px 12px;
            background:rgba(255,255,255,0.03);border-radius:10px;
            border:1px solid rgba(255,255,255,0.05);
            font-family:'DM Mono',monospace;font-size:11px;
            color:rgba(255,255,255,0.38);font-style:italic;
            display:flex;align-items:center;gap:8px;
        }
        .activity.hidden{display:none}

        .spotify-row{
            margin-top:8px;padding:10px 12px;
            background:rgba(30,215,96,0.05);border:1px solid rgba(30,215,96,0.12);
            border-radius:12px;display:flex;align-items:center;gap:11px;
        }
        .spotify-row.hidden{display:none}
        .spotify-art{width:44px;height:44px;border-radius:8px;flex-shrink:0;background:rgba(255,255,255,0.05);overflow:hidden;display:flex;align-items:center;justify-content:center}
        .spotify-art img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px}
        .spotify-text{overflow:hidden;flex:1}
        .spotify-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(30,215,96,0.75);margin-bottom:3px;font-weight:500}
        .spotify-song{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;letter-spacing:-0.01em}
        .spotify-artist{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.32);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
        .spotify-bars{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0}
        .spotify-bars span{width:3px;border-radius:2px;background:#1ed760;opacity:0.75;animation:barBounce 1s ease-in-out infinite}
        .spotify-bars span:nth-child(1){height:7px;animation-delay:0s}
        .spotify-bars span:nth-child(2){height:13px;animation-delay:0.2s}
        .spotify-bars span:nth-child(3){height:5px;animation-delay:0.35s}
        .spotify-bars span:nth-child(4){height:11px;animation-delay:0.15s}
        @keyframes barBounce{0%,100%{transform:scaleY(0.35)}50%{transform:scaleY(1)}}

        .divider{height:1px;background:rgba(255,255,255,0.05);margin:13px 0}

        .socials{display:flex;justify-content:center;gap:12px}
        .social-btn{
            width:40px;height:40px;border-radius:50%;
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;color:rgba(255,255,255,0.48);
            transition:background 0.2s,color 0.2s,border-color 0.2s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .social-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.16);color:#fff;transform:translateY(-3px) scale(1.1)}
        .social-btn svg{width:18px;height:18px}
        .social-btn:hover img{filter:invert(1) opacity(1) !important}
    </style>
</head>

                        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAACDklEQVR4AaXBTWjNAQAA8N/e/xHmMOWgFG9lkp5IO+wwKdQciLJ8JLU0pFZcXlZWW/kIlykHFwdCu8yYlBFZrcWBYl7PxT4sy9SsHaTXYhz+r96zvbfP36/IwuzBAZTjD7aYJGpmMZQjjtWICm1ABdJC7fKIyq8EtTiFdfIbQwK30Y9OeURNdRg3sBIfkMAbfJUVQxIjqMZyDMsj6n/NOIsBHEOH/AZkvUcajXhkkkBWE+rRje1Imp1RLMVB9KJHjohQBc7jA3ZjzFR1CruIAVzAEjkiQjfxG/vxU37lCksjgRjq5IigAltwFQMKi2KXwlrxEudRIiOCaqRx3fQacBeVCqvDcjTJCHAZn3DL9MbwBS0YQo+pRlCMM2jBaIBLeIoXZpZCL+5iDV5h3P/eoAZlaA1wDS/RaXZSeI0mHMc7DMoaxzc04lmABnSh0+z14QH2IYHF6MKEUBLbsCPAIYyjzdyM4h5KUYeNeIgJoWU4HWArdqLZ3I2jDStwHMV4LtSMoQARnEQ3+sxPB0pxGj+QQCWOBPiMo9iMO+bvCapwAv3Yi5SMavxFrYWJIS5HIJRCGc7hFQbNzxL0yRHIeoxNaEQ/kuamAg14jAkZgawJtGERmrEeHzFqeiWoRw1q8EuOIvnFcQVV6EA73mIYaaxCHFXYg/toQNokRaYXw2FUIo61Qt+RRAfuYVgB/wA/FobMdhN3FQAAAABJRU5ErkJggg==" alt="Lichess" style="width:18px;height:18px;filter:invert(1) opacity(0.48);transition:filter 0.2s;">
                    </a>
                </div>
            </div>

    </div>

    <script>
        const DISCORD_ID = '172383880677031938';
        const TEXT = 'click to dive into my world';

        // ─────────────────────────────────────────────────────────────
        // CANVAS TRAIL — smooth bezier ribbon
        // ─────────────────────────────────────────────────────────────
        const canvas = document.getElementById('trail-canvas');
        const ctx    = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Store trail points with timestamps
        const MAX_POINTS = 80;
        const trail = [];   // [{x, y, t}]
        let mouseX = -1000, mouseY = -1000;

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            document.getElementById('cursor-dot').style.left = e.clientX + 'px';
            document.getElementById('cursor-dot').style.top  = e.clientY + 'px';
        });

        const TRAIL_LIFETIME = 900; // ms

        function addPoint(x, y) {
            trail.push({ x, y, t: Date.now() });
            if (trail.length > MAX_POINTS) trail.shift();
        }

        let lastAdd = 0;
        function renderTrail() {
            const now = Date.now();

            // Add current position periodically
            if (now - lastAdd > 12) {
                lastAdd = now;
                if (mouseX > -999) addPoint(mouseX, mouseY);
            }

            // Remove old points
            const cutoff = now - TRAIL_LIFETIME;
            while (trail.length > 0 && trail[0].t < cutoff) trail.shift();

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (trail.length < 3) {
                requestAnimationFrame(renderTrail);
                return;
            }

            // Draw smooth catmull-rom spline through points
            // Group into segments with opacity based on age
            ctx.lineCap  = 'round';
            ctx.lineJoin = 'round';

            for (let i = 1; i < trail.length - 1; i++) {
                const age   = (now - trail[i].t) / TRAIL_LIFETIME; // 0=new, 1=old
                const alpha = Math.pow(1 - age, 1.8) * 0.75;
                if (alpha <= 0.01) continue;

                const p0 = trail[i - 1];
                const p1 = trail[i];
                const p2 = trail[i + 1];

                // Control points for smooth curve
                const cpx = (p0.x + p1.x) / 2;
                const cpy = (p0.y + p1.y) / 2;
                const cpx2 = (p1.x + p2.x) / 2;
                const cpy2 = (p1.y + p2.y) / 2;

                // Line width tapers from thick (new) to thin (old)
                const width = (1 - age) * 1.5 + 0.3;

                ctx.beginPath();
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth   = width;
                ctx.moveTo(cpx, cpy);
                ctx.quadraticCurveTo(p1.x, p1.y, cpx2, cpy2);
                ctx.stroke();
            }

            requestAnimationFrame(renderTrail);
        }
        renderTrail();

        // ─────────────────────────────────────────────────────────────
        // VOLUME
        // ─────────────────────────────────────────────────────────────
        const bgMusic  = document.getElementById('bg-music');
        const bgVideo  = document.getElementById('bg-video');
        const volWrap  = document.getElementById('vol-wrap');
        const visitorW = document.getElementById('visitor-wrap');
        let volOpen    = false;

        function toggleVolPanel() {
            volOpen = !volOpen;
            document.getElementById('vol-panel').classList.toggle('open', volOpen);
        }
        function setVol(val) {
            const v = parseInt(val) / 100;
            bgMusic.volume = v;
            bgMusic.muted = false;
            document.getElementById('vol-pct').textContent = val + '%';
            const svg = document.getElementById('vol-svg');
            if (v === 0) {
                svg.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
            } else if (v < 0.5) {
                svg.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
            } else {
                svg.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`;
            }
        }
        document.addEventListener('click', e => {
            if (volOpen && !volWrap.contains(e.target)) {
                volOpen = false;
                document.getElementById('vol-panel').classList.remove('open');
            }
        });

        // ─────────────────────────────────────────────────────────────
        // VISITOR COUNTER
        // ─────────────────────────────────────────────────────────────
        (function() {
            fetch('https://visitor.6developer.com/visit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    domain: encodeURIComponent(window.location.hostname),
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    page_path: window.location.pathname,
                    page_title: document.title,
                    referrer: document.referrer,
                    search_query: ''
                })
            })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('visitor-count');
                if (el && data.totalCount != null) el.textContent = Number(data.totalCount).toLocaleString();
            })
            .catch(() => {});
        })();

        // ─────────────────────────────────────────────────────────────
        // TYPEWRITER
        // ─────────────────────────────────────────────────────────────
        const typeEl = document.getElementById('typewriter');
        let i = 0;
        function type() {
            if (i < TEXT.length) { typeEl.textContent += TEXT[i++]; setTimeout(type, 65 + Math.random() * 45); }
        }
        setTimeout(type, 700);

        // ─────────────────────────────────────────────────────────────
        // SPLIT CURTAIN TRANSITION
        // ─────────────────────────────────────────────────────────────
        let splitDone = false;
        function triggerSplit() {
            if (splitDone) return;
            splitDone = true;

            const enter = document.getElementById('enter-screen');
            enter.classList.add('splitting');

            // Video first
            bgVideo.play().catch(() => {});
            setTimeout(() => bgVideo.classList.add('show'), 200);

            // Music with slight delay so browser doesn't block both
            bgMusic.load();
            bgMusic.volume = 0.45;
            setTimeout(() => {
                bgMusic.play().catch(() => {});
            }, 80);

            // Show main content while curtains fly out
            setTimeout(() => {
                document.getElementById('main-content').classList.add('visible');
                volWrap.classList.add('show');
                visitorW.classList.add('show');
            }, 400);

            // Remove enter screen after animation
            setTimeout(() => {
                enter.style.display = 'none';
            }, 1100);
        }

        // ─────────────────────────────────────────────────────────────
        // LANYARD
        // ─────────────────────────────────────────────────────────────
        async function fetchDiscord() {
            try {
                const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const json = await res.json();
                if (!json.success) return;
                const d = json.data, u = d.discord_user;

                const hash = u.avatar, ext = hash?.startsWith('a_') ? 'gif' : 'png';
                document.getElementById('avatar-img').src = hash
                    ? `https://cdn.discordapp.com/avatars/${u.id}/${hash}.${ext}?size=128`
                    : `https://cdn.discordapp.com/embed/avatars/${(parseInt(u.id) >> 22) % 6}.png`;

                const status = d.discord_status || 'offline';
                document.getElementById('status-dot-av').className = `status-dot-av ${status}`;
                document.getElementById('status-dot-b').className  = `status-dot-b ${status}`;
                const labels = {online:'Online',idle:'Idle',dnd:'Do not disturb',offline:'Offline'};
                document.getElementById('status-text').textContent = labels[status];

                const acts   = d.activities || [];
                const custom = acts.find(a => a.type === 4);
                const other  = acts.find(a => a.type !== 4 && a.type !== 2);
                const actRow = document.getElementById('activity-row');
                if (custom?.state) {
                    document.getElementById('activity-icon').textContent = '💬';
                    document.getElementById('activity-text').textContent = custom.state;
                    actRow.classList.remove('hidden');
                } else if (other) {
                    const icons = {0:'🎮',1:'📡',3:'📺'};
                    document.getElementById('activity-icon').textContent = icons[other.type] || '▶';
                    document.getElementById('activity-text').textContent = other.name;
                    actRow.classList.remove('hidden');
                } else { actRow.classList.add('hidden'); }

                const spRow = document.getElementById('spotify-row');
                if (d.spotify?.song) {
                    document.getElementById('spotify-song').textContent   = d.spotify.song;
                    document.getElementById('spotify-artist').textContent = d.spotify.artist;
                    document.getElementById('spotify-art').innerHTML = d.spotify.album_art_url
                        ? `<img src="${d.spotify.album_art_url}" alt="cover">` : '';
                    spRow.classList.remove('hidden');
                } else { spRow.classList.add('hidden'); }

            } catch(e) {}
        }

        fetchDiscord();
        setInterval(fetchDiscord, 20000);
    </script>
